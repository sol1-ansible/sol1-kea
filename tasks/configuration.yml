- name: Merge in the ha-enabled hook settings
  when: kea_dhcp4_ha_enabled | bool
  vars:
    kea_ha_hook:
      library: "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_ha.so"
      parameters:
        high-availability: "{{ kea_dhcp4_ha_config}}"
  ansible.builtin.set_fact:
    kea_dhcp4_hooks_libraries: "{{ kea_dhcp4_hooks_libraries + [kea_ha_hook] }}"

- name: Create apparmor permission files for kea
  ansible.builtin.template:
    src: "{{ item.name }}"
    dest: "{{ item.dest }}"
    mode: '0644'
  notify:
    - Reload permissions kea-dhcp4
    - Reload permissions kea-ctrl-agent
  loop: "{{ kea_apparmor_templates }}"

- name: Ensure dirs exists
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kea_user }}"
    group: "{{ kea_group }}"
    mode: "0750"
  loop:
    - "{{ kea_dir_config }}"
    - "{{ kea_dir_leases }}"
    - "{{ kea_dir_log }}"

- name: Ensure hosts.json exists
  copy:
    dest: "{{ kea_hosts_file }}"
    content: "[]\n"
    owner: root
    group: kea
    mode: "0640"
  when: kea_dhcp4_hosts_json_enable
  notify: reload kea

- name: Create kea config files
  ansible.builtin.template:
    src: "{{ template.name }}"
    dest: "{{ template.dest }}"
    mode: '0644'
  notify:
    - Restart kea-dhcp4
    - Restart kea-ctrl-agent
  loop: "{{ kea_config_templates }}"
  loop_control:
    loop_var: template

- name: Format config by removing empty lines
  ansible.builtin.lineinfile:
    path: "{{ template.dest }}"
    regex: '^\n'
    state: absent
  loop: "{{ kea_config_templates }}"
  loop_control:
    loop_var: template
