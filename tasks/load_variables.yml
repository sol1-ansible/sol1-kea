- name: Gather OS specific variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version }}.yml"
    - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version }}.yml"
    - "{{ ansible_distribution | lower }}.yml"
    - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version }}.yml"

- name: Sanity check for lease and hosts backend types
  assert:
    that:
      - kea_dhcp4_lease_database_type in ["postgresql", "mysql", "memfile"]
      - kea_dhcp4_hosts_database_type in ["postgresql", "mysql", "json"]
    fail_msg: >-
      Invalid database type for kea_dhcp4_lease_database_type or kea_dhcp4_hosts_database_type. Valid options are:
      - kea_dhcp4_lease_database_type: postgresql, mysql or memfile
      - kea_dhcp4_hosts_database_type: postgresql, mysql or json

- name: Sanity check for mixing DB types
  assert:
    that:
      - not (
          (kea_dhcp4_lease_database_type == "postgresql" and kea_dhcp4_hosts_database_type == "mysql") or
          (kea_dhcp4_lease_database_type == "mysql" and kea_dhcp4_hosts_database_type == "postgresql")
        )
    fail_msg: >-
      kea_dhcp4_lease_database_type and kea_dhcp4_hosts_database_type cannot mix 'postgresql' and 'mysql'.

- name: Sanity check for HA mode
  assert:
    that:
      - kea_dhcp4_ha_mode in ["hot-standby", "load-balancing", "passive-backup"]
    fail_msg: >-
      Invalid HA mode for kea_dhcp4_ha_mode. Valid options are hot-standby, load-balancing or passive-backup.

# Load the lease database type if not memfile or load the hosts database type if not json and lease is memfile 
- name: Gather DB specific variables
  when: kea_dhcp4_lease_database_type != "memfile"
  ansible.builtin.include_vars: "{{ kea_dhcp4_lease_database_type }}.yml"

- name: Gather DB specific variables
  when: kea_dhcp4_lease_database_type == "memfile" and kea_dhcp4_hosts_database_type != "json"
  ansible.builtin.include_vars: "{{ kea_dhcp4_hosts_database_type }}.yml"


# Set the default hooks if the user isn't trying to override them.
- name: Set lease database config
  when: _kea_dhcp4_hooks_libraries is defined and kea_dhcp4_hooks_libraries is not defined
  ansible.builtin.set_fact:
    kea_dhcp4_hooks_libraries: "{{ _kea_dhcp4_hooks_libraries }}"


# Set the sql database config if the user hasn't set it and we are using a sql backend
- name: Set lease database config
  when: kea_dhcp4_lease_database_type != "memfile" and kea_dhcp4_lease_database is not defined
  ansible.builtin.set_fact:
    kea_dhcp4_lease_database: "{{ _kea_dhcp4_lease_database }}"

- name: Set hosts database config
  when: kea_dhcp4_hosts_database_type != "json" and kea_dhcp4_hosts_database is not defined
  ansible.builtin.set_fact:
    kea_dhcp4_hosts_database: "{{ _kea_dhcp4_hosts_database }}"


# If we are using the hosts json backend or lease memfile backend we need to build the config variables for those
- name: Set lease memfile database config
  when: kea_dhcp4_lease_database_type == "memfile" and kea_dhcp4_lease_database is not defined
  ansible.builtin.set_fact:
    kea_dhcp4_lease_database:
      type: "memfile"
      persist: true
      name: "{{ kea_dhcp4_lease_file }}"
      flush-interval: "{{ kea_dhcp4_lease_flush_interval | default(30) }}"

- name: Set hosts json database config
  when: kea_dhcp4_hosts_database_type == "json" and kea_dhcp4_hosts_database is not defined
  ansible.builtin.set_fact:
    kea_dhcp4_hosts_database:
      type: "json"
      name: "{{ kea_dhcp4_hosts_json_file }}"

- name: Build install packages list
  ansible.builtin.set_fact:
    kea_install_packages: >-
      {{
        _kea_packages +
        (_database_packages | default([])) +
        (kea_packages | default([]))
        | unique
      }}


# Build HA peers list based on configured mode when HA is enabled
- name: Build HA peers for hot-standby mode
  when: 
   - kea_dhcp4_ha_enabled | bool
   - kea_dhcp4_ha_config is not defined
   - kea_dhcp4_ha_mode == "hot-standby"
  ansible.builtin.set_fact:
    kea_dhcp4_ha_config:
      - this-server-name: "{{ inventory_hostname }}"
        mode: "{{ kea_dhcp4_ha_mode}}"
        peers: 
          - name: "{{ kea_dhcp4_ha_1.name }}"
            url: "http://{{ kea_dhcp4_ha_1.host }}:{{ kea_dhcp4_ha_1.port }}/"
            role: "primary"
          - name: "{{ kea_dhcp4_ha_2.name }}"
            url: "http://{{ kea_dhcp4_ha_2.host }}:{{ kea_dhcp4_ha_2.port }}/"
            role: "standby"

- name: Build HA peers for load-balancing mode
  when: 
   - kea_dhcp4_ha_enabled | bool
   - kea_dhcp4_ha_config is not defined
   - kea_dhcp4_ha_mode == "load-balancing"
  ansible.builtin.set_fact:
    kea_dhcp4_ha_config:
      - this-server-name: "{{ inventory_hostname }}"
        mode: "{{ kea_dhcp4_ha_mode}}"
        peers: 
          - name: "{{ kea_dhcp4_ha_1.name }}"
            url: "http://{{ kea_dhcp4_ha_1.host }}:{{ kea_dhcp4_ha_port }}/"
            role: "primary"
          - name: "{{ kea_dhcp4_ha_2.name }}"
            url: "http://{{ kea_dhcp4_ha_2.host }}:{{ kea_dhcp4_ha_port }}/"
            role: "secondary"

- name: Build HA peers for passive-backup mode
  when: 
   - kea_dhcp4_ha_enabled | bool
   - kea_dhcp4_ha_config is not defined
   - kea_dhcp4_ha_mode == "passive-backup"
  ansible.builtin.set_fact:
    kea_dhcp4_ha_config:
      - this-server-name: "{{ inventory_hostname }}"
        mode: "{{ kea_dhcp4_ha_mode}}"
        peers: 
          - name: "{{ kea_dhcp4_ha_1.name }}"
            url: "http://{{ kea_dhcp4_ha_1.host }}:{{ kea_dhcp4_ha_port }}/"
            role: "primary"

# Build a normalised backup peers list from kea_dhcp4_ha_backup
- name: Build HA backup peers list
  when:
    - kea_dhcp4_ha_enabled | bool
    - kea_dhcp4_ha_backup is defined
  ansible.builtin.set_fact:
    _kea_dhcp4_ha_backup_peers: >-
      {{
        _kea_dhcp4_ha_backup_peers | default([]) + [{
          'name': item.name,
          'url': 'http://' ~ item.host ~ ':' ~ kea_dhcp4_ha_port ~ '/',
          'role': 'backup'
        }]
      }}
  loop: "{{ kea_dhcp4_ha_backup }}"

# Append backup peers to the ha config peers list
- name: Append backup peers to HA config
  when:
    - kea_dhcp4_ha_enabled | bool
    - _kea_dhcp4_ha_backup_peers is defined
  ansible.builtin.set_fact:
    kea_dhcp4_ha_config: >-
      {{
        [kea_dhcp4_ha_config[0] | combine({
          'peers': kea_dhcp4_ha_config[0].peers + _kea_dhcp4_ha_backup_peers
        })]
      }}


- name: Debug generated variables
  debug:
    msg: |
      kea_dhcp4_hooks_libraries: {{ kea_dhcp4_hooks_libraries }}
      kea_dhcp4_lease_database: {{ kea_dhcp4_lease_database }}
      kea_dhcp4_hosts_database: {{ kea_dhcp4_hosts_database }}
      kea_install_packages: {{ kea_install_packages }}
      kea_dhcp4_ha_config: {{ kea_dhcp4_ha_config }}

